services:
  - type: web
    name: socialgenie-api
    runtime: node
    region: singapore   # closest to India; change to "oregon" for US-West free tier
    plan: free
    rootDir: apps/api
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: node --experimental-specifier-resolution=node dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000          # Render sets PORT automatically; keep in sync
      - key: DATABASE_URL
        sync: false           # set manually in Render dashboard
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 30d
      - key: GROQ_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: META_APP_ID
        sync: false
      - key: META_APP_SECRET
        sync: false
      - key: META_WEBHOOK_VERIFY_TOKEN
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        value: auto
      - key: S3_BUCKET
        sync: false
      - key: S3_ENDPOINT
        sync: false           # Cloudflare R2 endpoint
      - key: CLOUDFRONT_DOMAIN
        sync: false
      - key: FRONTEND_URL
        sync: false           # your Vercel URL e.g. https://socialgenie.vercel.app
      - key: API_BASE_URL
        sync: false           # this service's Render URL e.g. https://socialgenie-api.onrender.com
